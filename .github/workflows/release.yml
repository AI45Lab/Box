name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Tests must pass before release ─────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      A3S_DEPS_STUB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Create stub libkrun for linking
        run: |
          echo "void krun_stub(void) {}" > /tmp/krun_stub.c
          gcc -shared -o /tmp/libkrun.so /tmp/krun_stub.c
          sudo cp /tmp/libkrun.so /usr/lib/
          sudo ldconfig
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
      - run: cd src && cargo test --workspace --lib

  # ── SDK Tests ─────────────────────────────────────────────────
  test-python-sdk:
    name: Test Python SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          pip install pytest pytest-asyncio
          cd sdk/python && python -m pytest tests/ -v

  test-typescript-sdk:
    name: Test TypeScript SDK
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: |
          cd sdk/typescript
          npm ci
          npm test

  # ── Build matrix ───────────────────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    needs: [test, test-python-sdk, test-typescript-sdk]
    strategy:
      matrix:
        include:
          - target: linux-x86_64
            os: ubuntu-latest
            rust_target: x86_64-unknown-linux-musl
            guest_target: x86_64-unknown-linux-musl
            build_cri: true
          - target: linux-arm64
            os: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-musl
            guest_target: aarch64-unknown-linux-musl
            build_cri: true
          - target: macos-arm64
            os: macos-14
            rust_target: ""
            guest_target: aarch64-unknown-linux-musl
            build_cri: false

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.guest_target }}

      - name: Install dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libssl-dev \
            musl-tools libclang-dev patchelf protobuf-compiler

      - name: Install dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install lld llvm protobuf
          pip3 install --break-system-packages ziglang
          cargo install cargo-zigbuild

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
          key: release-${{ matrix.target }}

      - name: Build host binaries
        run: |
          cd src
          cargo build --release -p a3s-box-cli -p a3s-box-shim
          if [ "${{ matrix.build_cri }}" = "true" ]; then
            cargo build --release -p a3s-box-cri
          fi

      - name: Build guest binaries
        run: |
          cd src
          if [ "${{ runner.os }}" = "macOS" ]; then
            cargo zigbuild --release \
              -p a3s-box-guest-init \
              --target ${{ matrix.guest_target }}
          else
            cargo build --release \
              -p a3s-box-guest-init \
              --target ${{ matrix.guest_target }}
          fi

      - name: Package release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          DIR="a3s-box-${TAG}-${{ matrix.target }}"
          mkdir -p "$DIR"

          cp src/target/release/a3s-box "$DIR/"
          cp src/target/release/a3s-box-shim "$DIR/"

          if [ "${{ matrix.build_cri }}" = "true" ]; then
            cp src/target/release/a3s-box-cri "$DIR/"
          fi

          cp "src/target/${{ matrix.guest_target }}/release/a3s-box-guest-init" "$DIR/"
          cp "src/target/${{ matrix.guest_target }}/release/a3s-box-nsexec" "$DIR/"

          cp README.md "$DIR/" 2>/dev/null || true
          cp LICENSE "$DIR/" 2>/dev/null || true

          tar czf "${DIR}.tar.gz" "$DIR"
          echo "ASSET=${DIR}.tar.gz" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: ${{ env.ASSET }}

  # ── Create GitHub Release ──────────────────────────────────────
  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: artifacts/**/*.tar.gz

  # ── Publish to crates.io ───────────────────────────────────────
  publish-crates:
    name: Publish to crates.io
    needs: release
    runs-on: ubuntu-latest
    env:
      A3S_DEPS_STUB: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - name: Create stub libkrun for linking
        run: |
          echo "void krun_stub(void) {}" > /tmp/krun_stub.c
          gcc -shared -o /tmp/libkrun.so /tmp/krun_stub.c
          sudo cp /tmp/libkrun.so /usr/lib/
          sudo ldconfig
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src
      - name: Publish crates
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          cd src
          # Publish in dependency order, skip already-published
          for crate in a3s-box-core a3s-box-sdk; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --allow-dirty 2>&1 || echo "Skipped $crate (may already be published)"
            sleep 10
          done

  # ── Publish Python SDK to PyPI ─────────────────────────────────
  publish-pypi:
    name: Publish to PyPI
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build twine
      - name: Build and publish
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: |
          cd sdk/python
          python -m build
          twine upload dist/*

  # ── Publish TypeScript SDK to npm ──────────────────────────────
  publish-npm:
    name: Publish to npm
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
      - name: Build and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          cd sdk/typescript
          npm ci
          npm run build
          npm publish --access public

  # ── Update Homebrew Formula ────────────────────────────────────
  publish-homebrew:
    name: Update Homebrew
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Wait for release assets
        run: sleep 15

      - name: Extract version
        id: version
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download release tarballs and compute SHA256
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          BASE="https://github.com/A3S-Lab/Box/releases/download/${TAG}"

          for target in linux-x86_64 linux-arm64 macos-arm64; do
            FILE="a3s-box-${TAG}-${target}.tar.gz"
            curl -sL "${BASE}/${FILE}" -o "${FILE}"
            SHA=$(shasum -a 256 "${FILE}" | awk '{print $1}')
            echo "SHA_${target//-/_}=${SHA}" >> "$GITHUB_ENV"
            echo "${target}: ${SHA}"
          done

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: A3S-Lab/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap

      - name: Update formula
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          VERSION="${{ steps.version.outputs.version }}"
          cat > homebrew-tap/Formula/a3s-box.rb << 'FORMULA'
          class A3sBox < Formula
            desc "MicroVM sandbox runtime with TEE support"
            homepage "https://github.com/A3S-Lab/Box"
            version "VERSION_PLACEHOLDER"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/A3S-Lab/Box/releases/download/TAG_PLACEHOLDER/a3s-box-TAG_PLACEHOLDER-macos-arm64.tar.gz"
                sha256 "SHA_MACOS_ARM64_PLACEHOLDER"
              end
            end

            on_linux do
              on_arm do
                url "https://github.com/A3S-Lab/Box/releases/download/TAG_PLACEHOLDER/a3s-box-TAG_PLACEHOLDER-linux-arm64.tar.gz"
                sha256 "SHA_LINUX_ARM64_PLACEHOLDER"
              end
              on_intel do
                url "https://github.com/A3S-Lab/Box/releases/download/TAG_PLACEHOLDER/a3s-box-TAG_PLACEHOLDER-linux-x86_64.tar.gz"
                sha256 "SHA_LINUX_X86_64_PLACEHOLDER"
              end
            end

            def install
              bin.install "a3s-box"
              bin.install "a3s-box-shim"
              bin.install "a3s-box-guest-init"
              bin.install "a3s-box-nsexec"
              bin.install "a3s-box-cri" if File.exist?("a3s-box-cri")
            end

            test do
              assert_match "a3s-box", shell_output("#{bin}/a3s-box --version")
            end
          end
          FORMULA

          # Replace placeholders
          sed -i "s/VERSION_PLACEHOLDER/${VERSION}/g" homebrew-tap/Formula/a3s-box.rb
          sed -i "s/TAG_PLACEHOLDER/${TAG}/g" homebrew-tap/Formula/a3s-box.rb
          sed -i "s/SHA_MACOS_ARM64_PLACEHOLDER/${SHA_macos_arm64}/g" homebrew-tap/Formula/a3s-box.rb
          sed -i "s/SHA_LINUX_ARM64_PLACEHOLDER/${SHA_linux_arm64}/g" homebrew-tap/Formula/a3s-box.rb
          sed -i "s/SHA_LINUX_X86_64_PLACEHOLDER/${SHA_linux_x86_64}/g" homebrew-tap/Formula/a3s-box.rb

      - name: Push formula
        run: |
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/a3s-box.rb
          git commit -m "chore: update a3s-box to ${{ steps.version.outputs.tag }}"
          git push
