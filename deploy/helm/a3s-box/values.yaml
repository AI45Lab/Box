# A3S Box Helm Chart — values.yaml

# IMPORTANT: no prebuilt CRI image is published yet. The repository below is a
# placeholder — there is currently no automated build/push of
# `a3s-box-cri` to a public registry, so a clean `helm install` will land in
# `ImagePullBackOff`. Until an official image ships, build and push your own
# from a node that can compile the runtime (it links libkrun), then point
# `image.repository`/`image.tag` at it:
#
#   # on a build host with the repo + a libkrun toolchain:
#   cargo build --release -p a3s-box-cri
#   # package a3s-box-cri (+ the musl guest-init) into your own image and push,
#   # then set image.repository/tag here.
#
# Track the image-publishing work before relying on the Helm path in production.
image:
  repository: ghcr.io/a3s-lab/a3s-box-cri
  tag: latest
  pullPolicy: IfNotPresent

# Node selector for DaemonSet and RuntimeClass scheduling
nodeSelector:
  a3s-box.io/runtime: "true"

# Tolerations for DaemonSet pods
tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# CRI runtime configuration
config:
  socketPath: /var/run/a3s-box/a3s-box.sock
  imageCacheSize: "10737418240"  # 10 GB
  logLevel: info

# DaemonSet resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# RuntimeClass overhead per pod
overhead:
  memory: 30Mi
  cpu: 50m

# RuntimeClass handler name (must match containerd/CRI-O config)
runtimeHandler: a3s-box

# RBAC
serviceAccount:
  create: true
  name: a3s-box-cri

# Security context for the CRI container
securityContext:
  privileged: true  # Required for /dev/kvm access

# Probes
livenessProbe:
  initialDelaySeconds: 5
  periodSeconds: 10

readinessProbe:
  initialDelaySeconds: 3
  periodSeconds: 5
