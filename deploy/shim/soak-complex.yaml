# Complex RuntimeClass soak pods for a3s-box validation.
#
# These workloads stay inside the explicitly enrolled validation namespace and
# only schedule onto nodes labeled for production-soak testing. They exercise
# stateful command loops, service daemons, logs, and long-lived process handling
# without pinning to a raw nodeName.
---
apiVersion: v1
kind: Namespace
metadata:
  name: a3s-box-validation
  labels:
    a3s-box.io/validation: "true"
---
apiVersion: v1
kind: Pod
metadata:
  name: cplx-redis
  namespace: a3s-box-validation
  labels:
    app: a3s-box-soak
    soak: cplx
    workload: redis
spec:
  runtimeClassName: a3s-box
  nodeSelector:
    a3s-box.io/runtime: "true"
    a3s-box.io/test-tier: production-soak
  tolerations:
    - key: a3s-box.io/soak
      operator: Equal
      value: "true"
      effect: NoSchedule
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
  containers:
    - name: redis
      image: docker.m.daocloud.io/library/redis:7-alpine
      resources:
        requests:
          cpu: "10m"
          memory: "256Mi"
        limits:
          cpu: "1"
          memory: "512Mi"
      command:
        - sh
        - -c
        - |
          echo "REDIS_SOAK start=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          redis-server --unixsocket /tmp/r.sock --port 0 --save "" --appendonly no &
          sleep 4
          n=0; ok=0; bad=0
          while true; do
            redis-cli -s /tmp/r.sock set k$((n%500)) v$n >/dev/null 2>&1
            v=$(redis-cli -s /tmp/r.sock get k$((n%500)) 2>/dev/null)
            if [ "$v" = "v$n" ]; then ok=$((ok+1)); else bad=$((bad+1)); fi
            n=$((n+1))
            [ $((n%1000)) -eq 0 ] && echo "REDIS_SOAK ops=$n ok=$ok bad=$bad"
          done
---
apiVersion: v1
kind: Pod
metadata:
  name: cplx-postgres
  namespace: a3s-box-validation
  labels:
    app: a3s-box-soak
    soak: cplx
    workload: postgres
spec:
  runtimeClassName: a3s-box
  nodeSelector:
    a3s-box.io/runtime: "true"
    a3s-box.io/test-tier: production-soak
  tolerations:
    - key: a3s-box.io/soak
      operator: Equal
      value: "true"
      effect: NoSchedule
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
  containers:
    - name: postgres
      image: docker.m.daocloud.io/library/postgres:16-alpine
      env:
        - name: POSTGRES_PASSWORD
          value: soaktest
      resources:
        requests:
          cpu: "10m"
          memory: "512Mi"
        limits:
          cpu: "2"
          memory: "1Gi"
      command:
        - sh
        - -c
        - |
          echo "PG_SOAK start=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          docker-entrypoint.sh postgres &
          ready=0
          for i in $(seq 1 180); do
            if pg_isready -U postgres -d postgres -q && \
              psql -U postgres -d postgres -v ON_ERROR_STOP=1 \
                -c "CREATE TABLE IF NOT EXISTS t(id serial primary key, v text)" >/dev/null 2>&1; then
              ready=1
              echo "PG_SOAK table_ready=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "PG_SOAK table_ready=false"
            exit 1
          fi
          set -e
          n=0
          while true; do
            psql -U postgres -d postgres -v ON_ERROR_STOP=1 -c "INSERT INTO t(v) VALUES ('soak'||$n)" >/dev/null
            c=$(psql -U postgres -d postgres -tAc "SELECT count(*) FROM t")
            n=$((n+1))
            [ $((n%200)) -eq 0 ] && echo "PG_SOAK inserts=$n rows=$c"
          done
---
apiVersion: v1
kind: Pod
metadata:
  name: cplx-nginx
  namespace: a3s-box-validation
  labels:
    app: a3s-box-soak
    soak: cplx
    workload: nginx
spec:
  runtimeClassName: a3s-box
  nodeSelector:
    a3s-box.io/runtime: "true"
    a3s-box.io/test-tier: production-soak
  tolerations:
    - key: a3s-box.io/soak
      operator: Equal
      value: "true"
      effect: NoSchedule
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
  containers:
    - name: nginx
      image: docker.m.daocloud.io/library/nginx:1.27-alpine
      resources:
        requests:
          cpu: "10m"
          memory: "128Mi"
        limits:
          cpu: "1"
          memory: "256Mi"
      command:
        - sh
        - -c
        - |
          echo "NGINX_SOAK start=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          nginx -g 'daemon off;' &
          nginx_pid=$!
          trap 'kill "$nginx_pid"; wait "$nginx_pid"' TERM INT
          while kill -0 "$nginx_pid" 2>/dev/null; do
            sleep 30
            echo "NGINX_SOAK alive=$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          done
          wait "$nginx_pid"
---
apiVersion: v1
kind: Pod
metadata:
  name: cplx-python
  namespace: a3s-box-validation
  labels:
    app: a3s-box-soak
    soak: cplx
    workload: python
spec:
  runtimeClassName: a3s-box
  nodeSelector:
    a3s-box.io/runtime: "true"
    a3s-box.io/test-tier: production-soak
  tolerations:
    - key: a3s-box.io/soak
      operator: Equal
      value: "true"
      effect: NoSchedule
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
  containers:
    - name: python
      image: docker.m.daocloud.io/library/python:3.12-alpine
      resources:
        requests:
          cpu: "10m"
          memory: "128Mi"
        limits:
          cpu: "1"
          memory: "256Mi"
      command:
        - python3
        - -c
        - |
          import http.server
          import socketserver
          import threading
          import time

          print("PY_SOAK start", flush=True)
          threading.Thread(
              target=lambda: socketserver.TCPServer(
                  ("127.0.0.1", 8080),
                  http.server.SimpleHTTPRequestHandler,
              ).serve_forever(),
              daemon=True,
          ).start()
          i = 0
          while True:
              i += 1
              time.sleep(2)
              if i % 30 == 0:
                  print("PY_SOAK alive=%ds" % (i * 2), flush=True)
