# RuntimeClass smoke pod for explicitly enrolled a3s-box validation nodes.
#
# Apply after creating the RuntimeClass and labeling the target nodes:
#   kubectl label node <node> a3s-box.io/runtime=true
#   kubectl label node <node> a3s-box.io/test-tier=production-soak
#   kubectl taint node <node> a3s-box.io/soak=true:NoSchedule
---
apiVersion: v1
kind: Namespace
metadata:
  name: a3s-box-validation
  labels:
    a3s-box.io/validation: "true"
---
apiVersion: v1
kind: Pod
metadata:
  name: a3s-box-smoke
  namespace: a3s-box-validation
  labels:
    app: a3s-box-smoke
spec:
  runtimeClassName: a3s-box
  nodeSelector:
    a3s-box.io/runtime: "true"
    a3s-box.io/test-tier: production-soak
  tolerations:
    - key: a3s-box.io/soak
      operator: Equal
      value: "true"
      effect: NoSchedule
  restartPolicy: Never
  terminationGracePeriodSeconds: 30
  containers:
    - name: hello
      image: docker.io/library/alpine:latest
      command: ["sh", "-c", "echo HELLO_FROM_A3S_BOX; uname -a; sleep 3600"]
      resources:
        requests:
          cpu: "250m"
          memory: "128Mi"
        limits:
          cpu: "1"
          memory: "512Mi"
