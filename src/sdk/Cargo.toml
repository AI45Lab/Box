[package]
name = "a3s-box-sdk"
version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
description = "Embedded MicroVM sandbox SDK — create, exec, stop sandboxes from your code"
build = "build.rs"

[features]
default = []
# Embed the pre-compiled a3s-box-shim binary into the SDK.
# When enabled, the shim is auto-extracted to ~/.a3s/bin/ on first use.
# Requires: either `A3S_SHIM_BINARY_PATH` env var or `a3s-box-shim` crate in workspace.
embed-shim = []

[dependencies]
a3s-box-core = { path = "../core" }
a3s-box-runtime = { path = "../runtime" }
a3s-transport = { workspace = true }

tokio = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
uuid = { workspace = true }
thiserror = { workspace = true }
base64 = { workspace = true }
dirs = "5"

[dev-dependencies]
tempfile = { workspace = true }
